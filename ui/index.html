<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Tracker UI Wrapper</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app" id="appRoot">
    <header class="topbar">
      <button id="menuButton" class="icon-btn" aria-label="Открыть меню">≡</button>
      <h1 class="title">TIME TRACKER</h1>
      <div class="spacer"></div>
    </header>

    <aside class="side-menu" id="sideMenu" aria-hidden="true">
      <button id="closeMenuButton" class="icon-btn close-btn" aria-label="Закрыть меню">✕</button>
      <nav class="menu-nav">
        <button class="nav-link" data-view="home">TIME TRACKER</button>
        <button class="nav-link" data-view="calendar">CALENDAR</button>
        <button class="nav-link" data-view="settings">SETTING</button>
      </nav>

      <section class="menu-controls">
        <div class="control-row">
          <span>TIME FORMAT</span>
          <label class="switch" for="timeFormatToggle">
            <input type="checkbox" id="timeFormatToggle" />
            <span class="slider"></span>
          </label>
        </div>

        <div class="control-row">
          <span>THEME</span>
          <button id="themeButton" class="moon-btn" aria-label="Сменить тему">◐</button>
        </div>
      </section>
    </aside>
    <div class="backdrop" id="menuBackdrop"></div>

    <main class="screen-wrap">
      <section class="screen is-active" data-screen="home">
        <p class="date" id="todayDate">--.--.----</p>
        <p class="current-time" id="todayTime">--:--</p>

        <div class="actions home-actions">
          <button class="action-btn" id="mainActionButton">START</button>
          <button class="action-btn" id="saveActionButton" hidden>SAVE</button>
        </div>

        <article class="entry" id="activeEntry">
          <p class="entry-main" id="activeEntryMain">--:-- - <span class="total-time" data-minutes="0">0.0h</span> - ...</p>
          <p class="entry-note" id="activeEntryNote">active session</p>
        </article>

        <section id="todaySavedList" class="saved-list"></section>
      </section>

      <section class="screen" data-screen="calendar">
        <div id="calendarWindowMenu" class="calendar-window">
          <header class="calendar-window-head">
            <button class="window-mark calendar-menu-trigger">≡</button>
            <h2 class="screen-title">CALENDAR</h2>
          </header>

          <div class="calendar-menu">
            <div class="calendar-menu-links">
              <button class="cal-link" id="openYearsButton">YEAR</button>
              <button class="cal-link" id="openMonthsButton">MONTH</button>
              <button class="cal-link" id="openShiftsButton">SHIFTS</button>
            </div>
            <p class="calendar-today" id="calendarToday">TODAY: --.--.----</p>
          </div>
        </div>

        <div id="calendarWindowYears" class="calendar-window" hidden>
          <header class="calendar-window-head">
            <button class="window-mark calendar-menu-trigger" aria-label="Открыть меню">≡</button>
            <h2 class="screen-title">YEAR</h2>
            <button id="yearsBackButton" class="icon-btn" aria-label="Назад">↩</button>
          </header>
          <div class="list-box">
            <div id="yearsListContent"></div>
          </div>
        </div>

        <div id="calendarWindowMonths" class="calendar-window" hidden>
          <header class="calendar-window-head">
            <button class="window-mark calendar-menu-trigger" aria-label="Открыть меню">≡</button>
            <h2 class="screen-title" id="monthsWindowTitle">----</h2>
            <button id="monthsBackButton" class="icon-btn" aria-label="Назад">↩</button>
          </header>
          <div class="list-box">
            <div id="monthsListContent"></div>
          </div>
        </div>

        <div id="calendarWindowShifts" class="calendar-window" hidden>
          <header class="calendar-window-head">
            <button class="window-mark calendar-menu-trigger" aria-label="Открыть меню">≡</button>
            <button class="icon-btn" id="prevMonthButton">◀</button>
            <h2 class="screen-title" id="shiftMonthLabel">MARCH</h2>
            <button class="icon-btn" id="nextMonthButton">▶</button>
            <button id="shiftBackButton" class="icon-btn" aria-label="Назад">↩</button>
          </header>
          <p class="sum-row sum-row-split">SUM: <span class="total-time" id="shiftMonthTotal" data-minutes="0">0.0h</span><span id="shiftYearLabel">----</span></p>
          <div id="shiftPanel" class="shift-panel">
            <div id="shiftList" class="shift-list"></div>
          </div>
          <div class="shift-footer">
            <div class="fab-row">
              <button class="icon-btn fab" id="addShiftButton">+</button>
              <button class="icon-btn fab" id="editShiftButton">✎</button>
            </div>
          </div>
        </div>
      </section>

      <section class="screen" data-screen="settings">
        <h2 class="screen-title">SETTING</h2>
        <div class="settings-list">
          <div class="setting-item">
            <span>Theme</span>
            <span id="themeLabel">Dark</span>
          </div>
          <div class="setting-item">
            <span>Format</span>
            <span id="formatLabel">6.8h</span>
          </div>
          <div class="setting-item btns">
            <button class="action-btn small" id="exportButton">EXPORT DATA</button>
            <button class="action-btn small" id="importButton">IMPORT DATA</button>
          </div>
        </div>
      </section>
    </main>

    <input id="importInput" type="file" accept="application/json" hidden />

    <div class="modal" id="entryModal" hidden>
      <div class="modal-card">
        <h3 id="entryModalTitle">SAVE DAY</h3>
        <p class="date" id="modalDate">--.--.----</p>
        <p class="time-line">HOURS: <span id="modalHours" class="total-time" data-minutes="0">0.0h</span></p>

        <div class="time-grid">
          <label>
            START
            <input id="modalStartInput" type="text" inputmode="numeric" maxlength="5" placeholder="22:09" />
          </label>
          <label>
            END
            <input id="modalEndInput" type="text" inputmode="numeric" maxlength="5" placeholder="23:09" />
          </label>
        </div>

        <label class="note-field">
          NOTE
          <textarea id="modalNoteInput" rows="4"></textarea>
        </label>

        <div class="actions">
          <button class="action-btn" id="modalCancelButton">CANCL</button>
          <button class="action-btn" id="modalSaveButton">SAVE</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
